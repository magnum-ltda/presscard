<section class="section-padding background-white">
  <div class="container">
    <div class="section-title">
      <h2>Como Funciona</h2>
    </div>

    <div class="how-it-works-grid">
      <ng-container *ngFor="let step of steps; let last = last; let i = index">
        <div class="step-item">
          <div class="hexagon-wrapper" [class]="step.color">
            <div class="hexagon">
              <span>{{ step.number }}</span>
            </div>
          </div>
          <h3>{{ step.title }}</h3>
        </div>
        
        <div class="step-arrow" *ngIf="!last">
          <mat-icon>chevron_right</mat-icon>
        </div>
      </ng-container>
    </div>
  </div>
</section>
